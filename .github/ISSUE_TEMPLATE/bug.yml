name: I found a bug!
description: Report a bug in mod
labels:
  - type: bug
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: Please describe the issue with as much detail as possible. Explain what happened, and what should have happened instead. Add images, screenshots, or videos if they could be useful.
      placeholder: Leave a comment
    validations:
      required: true

  - type: input
    id: game-log
    attributes:
      label: Game Log
      description: We need the game log for additional information about the bug. This file can be found in the "logs" folder of your Minecraft folder as "latest.log". Please upload the file to https://mclo.gs/ and put the link here. Do not paste the contents of the file here, because that will make this issue very hard to read.
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to make a report and help improve the mod!
