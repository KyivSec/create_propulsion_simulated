name: My game crashed!
description: Report a crash in Sable
title: ""
labels:
  - crash
body:
  - type: textarea
    id: context
    attributes:
      label: Context
      description: What were you doing when the game crashed? Add images, screenshots, or videos if they could be useful.
      placeholder: Leave a comment
    validations:
      required: true

  - type: input
    id: crash-report
    attributes:
      label: Crash Report
      description: We need the crash report to figure out why the crash happened. This file can be found in the "crash-reports" folder of your Minecraft folder. It will be the newest file there. Please upload the file to https://mclo.gs/ and put the link here. Do not paste the contents of the file here, because that will make this issue very hard to read.
      placeholder: https://mclo.gs/...
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to make a report and help improve Sable!

        Remember, contributions to this repository should follow its contributing guidelines.
